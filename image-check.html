<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TTG Wrestler Image Check</title><link rel="stylesheet" href="styles.css"><style>body{padding:20px}.check-head{max-width:1200px;margin:auto;text-align:center}.check-grid{max-width:1200px;margin:20px auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}.check-item{background:#101116;border:1px solid #41454d;padding:8px}.check-item img{width:100%;display:block}.status{padding:8px;font-weight:900;font-size:12px}.ok{color:#69ec8c}.bad{color:#ff6b6b}.filename{font-family:monospace;font-size:10px;color:#9da3ad;word-break:break-all}</style></head><body><div class="check-head"><h1 class="title">Wrestler Image Check</h1><p class="sub">All 20 cards should display with a green LOADED status.</p><p><a class="btn" href="index.html">OPEN GAME</a></p></div><div id="grid" class="check-grid"></div><script src="data.js"></script><script>const grid=document.getElementById('grid');WRESTLERS.forEach(w=>{const item=document.createElement('article');item.className='check-item';const img=document.createElement('img');const status=document.createElement('div');status.className='status';status.textContent='CHECKING…';const fn=document.createElement('div');fn.className='filename';fn.textContent=w.image;img.onload=()=>{status.className='status ok';status.textContent=`LOADED · ${img.naturalWidth}×${img.naturalHeight}`};img.onerror=()=>{status.className='status bad';status.textContent='MISSING OR INVALID FILE'};img.src=w.image;item.append(img,status,fn);grid.append(item)});</script></body></html>
